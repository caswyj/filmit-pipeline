services:
  postgres:
    image: ${N2V_REGISTRY_MIRROR:-docker.m.daocloud.io}/library/postgres:16
    environment:
      POSTGRES_USER: n2v
      POSTGRES_PASSWORD: n2v
      POSTGRES_DB: n2v
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n2v -d n2v"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: ${N2V_REGISTRY_MIRROR:-docker.m.daocloud.io}/library/redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6379:6379"

  minio:
    image: ${N2V_REGISTRY_MIRROR:-docker.m.daocloud.io}/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ./apps/api
      args:
        PYTHON_BASE_IMAGE: ${N2V_PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim-bookworm}
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace/libs/provider_adapters:/workspace/libs/workflow_engine:/workspace/libs/consistency_engine
    volumes:
      - ./:/workspace
      - /Users/wyj/proj/novel-to-video-demo-cases:/Users/wyj/proj/novel-to-video-demo-cases
    working_dir: /workspace/apps/api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        NODE_BASE_IMAGE: ${N2V_NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:22-alpine}
    env_file:
      - .env
    working_dir: /app
    command: ["sh", "-lc", "npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"]
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    ports:
      - "3000:3000"

  llm-worker:
    build:
      context: ./apps/api
      args:
        PYTHON_BASE_IMAGE: ${N2V_PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim-bookworm}
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace/libs/provider_adapters:/workspace/libs/workflow_engine:/workspace/libs/consistency_engine
    volumes:
      - ./:/workspace
      - /Users/wyj/proj/novel-to-video-demo-cases:/Users/wyj/proj/novel-to-video-demo-cases
    working_dir: /workspace
    command: ["python", "-m", "workers.llm_worker.tasks"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  media-worker:
    build:
      context: ./apps/api
      args:
        PYTHON_BASE_IMAGE: ${N2V_PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim-bookworm}
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace/libs/provider_adapters:/workspace/libs/workflow_engine:/workspace/libs/consistency_engine
    volumes:
      - ./:/workspace
      - /Users/wyj/proj/novel-to-video-demo-cases:/Users/wyj/proj/novel-to-video-demo-cases
    working_dir: /workspace
    command: ["python", "-m", "workers.media_worker.tasks"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped
